<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vocabulary Bank — Teacher Benny</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:       #1A2E4A;
    --navy-deep:  #0F1E30;
    --navy-soft:  #2A4060;
    --gold:       #C9960C;
    --gold-light: #F9F0D0;
    --gold-mid:   #E8C040;
    --cream:      #FAF7F0;
    --cream-dark: #F0EBE0;
    --cream-border: #E2D9C8;
    --white:      #FFFFFF;
    --ink:        #1A2E4A;
    --ink-soft:   #2A4060;
    --muted:      #6A7E94;
    --radius:     14px;

    /* topic colours — all blue-gold family */
    --c-work:     #1A6B8A;
    --c-feelings: #C9960C;
    --c-opinion:  #2A5A8A;
    --c-change:   #1E7A5A;
    --c-problems: #8A3A1A;
    --c-time:     #5A4A8A;
    --c-people:   #1A7A6A;
    --c-society:  #8A6A1A;
  }

  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--cream); font-family:'Inter',sans-serif; color:var(--ink); min-height:100vh; }

  /* ── HEADER ── */
  .site-header {
    background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 100%);
    padding: 16px 28px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 200;
    box-shadow: 0 2px 16px rgba(15,30,48,0.35);
    border-bottom: 3px solid var(--gold);
  }
  .logo { font-family:'Fraunces',serif; font-size:22px; font-weight:700; color:var(--cream); flex-shrink:0; }
  .logo span { color:var(--gold-mid); }

  .search-wrap { flex:1; min-width:180px; max-width:420px; position:relative; }
  .search-wrap svg { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
  #searchInput {
    width:100%; background:rgba(250,247,240,0.1); border:1px solid rgba(250,247,240,0.2);
    border-radius:8px; color:var(--cream); font-family:'Inter',sans-serif; font-size:14px;
    padding:9px 12px 9px 34px; outline:none; transition:border-color .2s;
  }
  #searchInput::placeholder { color:rgba(250,247,240,0.35); }
  #searchInput:focus { border-color:var(--gold-mid); }

  .header-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .word-badge { font-size:12px; color:rgba(250,247,240,0.5); white-space:nowrap; }
  .btn-quiz {
    background:var(--gold); color:var(--navy-deep); border:none; border-radius:8px;
    padding:9px 18px; font-family:'Inter',sans-serif; font-size:13px; font-weight:700;
    cursor:pointer; white-space:nowrap; transition:opacity .2s; letter-spacing:.02em;
  }
  .btn-quiz:hover { opacity:.85; }

  /* ── TOPIC TAB BAR ── */
  .topic-bar-wrap {
    background: var(--navy-deep);
    position: sticky; top: 57px; z-index: 100;
    overflow-x: auto; scrollbar-width: none;
    padding: 16px 20px;
    box-shadow: 0 4px 16px rgba(15,30,48,0.3);
  }
  .topic-bar-wrap::-webkit-scrollbar { display: none; }
  .topic-tab-row {
    display: flex;
    gap: 10px;
    min-width: max-content;
    align-items: stretch;
  }

  /* ALL TOPICS pill */
  .tab-all {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 20px;
    border: 2px solid rgba(255,255,255,0.18);
    border-radius: 50px;
    background: rgba(255,255,255,0.07);
    cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
    color: rgba(250,247,240,0.65);
    white-space: nowrap; transition: all .2s;
    flex-shrink: 0;
  }
  .tab-all:hover {
    background: rgba(255,255,255,0.14);
    color: var(--cream);
    border-color: rgba(255,255,255,0.35);
  }
  .tab-all.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--navy-deep);
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(201,150,12,0.45);
  }

  /* TOPIC BUBBLE */
  .topic-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 14px 20px 12px;
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
    transition: all .2s;
    flex-shrink: 0;
    min-width: 90px;
    position: relative;
    overflow: hidden;
  }
  .topic-tab::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--tab-color, #fff);
    opacity: 0;
    transition: opacity .2s;
  }
  .topic-tab:hover::before { opacity: 0.12; }
  .topic-tab.active::before { opacity: 1; }
  .topic-tab.active {
    border-color: var(--tab-color);
    box-shadow: 0 4px 18px rgba(0,0,0,0.25);
    transform: translateY(-2px);
  }
  .tab-icon {
    font-size: 26px;
    line-height: 1;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
  }
  .tab-label {
    font-size: 11px; font-weight: 600;
    color: rgba(250,247,240,0.65);
    letter-spacing: .03em;
    position: relative; z-index: 1;
    transition: color .2s;
    text-align: center;
    line-height: 1.3;
  }
  .topic-tab.active .tab-label { color: #fff; font-weight: 700; }
  .topic-tab:hover .tab-label   { color: var(--cream); }
  .tab-count {
    font-size: 11px; font-weight: 600;
    color: rgba(250,247,240,0.45);
    background: rgba(0,0,0,0.2);
    border-radius: 20px; padding: 2px 8px;
    position: relative; z-index: 1;
    transition: all .2s;
  }
  .topic-tab.active .tab-count {
    background: rgba(255,255,255,0.25);
    color: #fff;
  }

  /* ── MAIN ── */
  .main-content { max-width:1300px; margin:0 auto; padding:28px 28px 80px; }

  .results-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:8px; }
  .results-info { font-size:13px; color:var(--muted); }
  .results-info strong { color:var(--ink); }
  .type-filters { display:flex; gap:6px; flex-wrap:wrap; }
  .type-chip {
    font-size:12px; padding:4px 12px; border-radius:20px;
    border:1.5px solid var(--cream-border); background:none; color:var(--muted);
    cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s;
  }
  .type-chip.on { border-color:var(--gold); color:var(--gold); background:var(--gold-light); font-weight:600; }

  /* ── TOPIC SECTION ── */
  .topic-section { margin-bottom:44px; }
  .section-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; padding-bottom:12px; border-bottom:2px solid var(--cream-border); }
  .section-icon { width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .section-title { font-family:'Fraunces',serif; font-size:24px; font-weight:700; color:var(--ink); }
  .section-count { font-size:13px; color:var(--muted); margin-left:auto; }

  /* ── CARDS ── */
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(288px,1fr)); gap:13px; }
  .vocab-card {
    background:var(--white); border-radius:var(--radius);
    border-top:4px solid var(--card-accent,#ccc);
    padding:15px 17px; box-shadow:0 1px 4px rgba(26,46,74,0.07);
    transition:box-shadow .2s, transform .15s;
  }
  .vocab-card:hover { box-shadow:0 5px 18px rgba(26,46,74,0.13); transform:translateY(-2px); }

  .card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:5px; gap:8px; }
  .headword { font-family:'Fraunces',serif; font-size:21px; font-weight:700; color:var(--ink); line-height:1.15; }
  .headword em { font-style:italic; font-weight:300; font-size:13px; color:var(--muted); margin-left:5px; font-family:'Fraunces',serif; }

  .register-tag { font-size:10px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; padding:3px 8px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
  .reg-formal   { background:#EEF3FA; color:#1A4A8A; }
  .reg-informal { background:#FDF5E0; color:#8A6A00; }
  .reg-neutral  { background:#F0F5FA; color:#2A5A8A; }
  .reg-negative { background:#FDF5E0; color:#8A3A00; }

  .word-family { font-size:11px; color:var(--muted); margin-bottom:9px; line-height:1.6; }
  .word-family span { background:var(--cream); padding:1px 6px; border-radius:4px; margin-right:3px; display:inline-block; margin-bottom:2px; border:1px solid var(--cream-border); }

  .mini-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:4px; }
  .syn-list { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:9px; }
  .syn-chip { font-size:12px; background:var(--cream); border:1px solid var(--cream-border); border-radius:20px; padding:2px 9px; color:var(--ink-soft); }

  .colloc-text { font-size:12px; color:var(--ink-soft); font-style:italic; line-height:1.5; margin-bottom:8px; }
  .colloc-text strong { font-style:normal; font-weight:600; color:var(--ink); }

  .example { font-size:12.5px; color:var(--muted); line-height:1.55; border-top:1px solid var(--cream-border); padding-top:8px; margin-top:4px; }
  .example::before { content:'"'; font-family:'Fraunces',serif; font-size:18px; color:var(--gold); line-height:0; vertical-align:-4px; margin-right:2px; }
  .example::after  { content:'"'; font-family:'Fraunces',serif; font-size:18px; color:var(--gold); line-height:0; vertical-align:-4px; margin-left:2px; }

  .no-results { text-align:center; padding:60px 20px; color:var(--muted); font-size:15px; }
  .no-results strong { display:block; font-family:'Fraunces',serif; font-size:28px; color:var(--ink); margin-bottom:8px; }

  /* ── QUIZ ── */
  .quiz-overlay { display:none; position:fixed; inset:0; background:rgba(15,30,48,0.7); z-index:300; align-items:center; justify-content:center; padding:20px; }
  .quiz-overlay.open { display:flex; }
  .quiz-panel { background:var(--white); border-radius:18px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; padding:32px; position:relative; box-shadow:0 20px 60px rgba(15,30,48,0.3); }
  .quiz-close { position:absolute; top:14px; right:14px; background:var(--cream); border:none; border-radius:50%; width:32px; height:32px; cursor:pointer; font-size:17px; color:var(--muted); display:flex; align-items:center; justify-content:center; }
  .quiz-close:hover { background:var(--cream-dark); }
  .quiz-title { font-family:'Fraunces',serif; font-size:26px; font-weight:700; color:var(--ink); margin-bottom:4px; }
  .quiz-subtitle { font-size:13px; color:var(--muted); margin-bottom:22px; }

  .quiz-mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:22px; }
  .quiz-mode-card { border:2px solid var(--cream-border); border-radius:10px; padding:14px; cursor:pointer; text-align:center; transition:all .15s; background:var(--white); }
  .quiz-mode-card:hover, .quiz-mode-card.selected { border-color:var(--gold); background:var(--gold-light); }
  .quiz-mode-icon { font-size:24px; margin-bottom:5px; }
  .quiz-mode-name { font-size:13px; font-weight:600; color:var(--ink); }
  .quiz-mode-desc { font-size:11px; color:var(--muted); margin-top:2px; }

  .qf-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }
  .quiz-filter-row { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:20px; }
  .quiz-filter-chip { font-size:12px; padding:5px 12px; border-radius:20px; border:1.5px solid var(--cream-border); background:none; cursor:pointer; color:var(--muted); font-family:'Inter',sans-serif; transition:all .15s; }
  .quiz-filter-chip.on { border-color:var(--navy); color:var(--navy); background:#EEF3FA; font-weight:500; }

  .btn-start-quiz { width:100%; background:var(--navy); color:var(--cream); border:none; border-radius:10px; padding:14px; font-family:'Inter',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:opacity .2s; }
  .btn-start-quiz:hover { opacity:.85; }

  .quiz-q-screen { display:none; }
  .quiz-q-screen.active { display:block; }
  .quiz-progress-bar { height:4px; background:var(--cream-dark); border-radius:2px; margin-bottom:20px; overflow:hidden; }
  .quiz-progress-fill { height:100%; background:var(--gold); border-radius:2px; transition:width .4s; }
  .quiz-q-label { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .quiz-q-word { font-family:'Fraunces',serif; font-size:32px; font-weight:700; color:var(--ink); margin-bottom:4px; }
  .quiz-q-hint { font-size:13px; color:var(--muted); margin-bottom:20px; }

  .quiz-options { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:16px; }
  .quiz-opt { border:2px solid var(--cream-border); border-radius:10px; padding:12px 13px; background:var(--white); cursor:pointer; font-size:14px; color:var(--ink); font-family:'Inter',sans-serif; transition:all .15s; text-align:left; line-height:1.4; }
  .quiz-opt:hover:not(:disabled) { border-color:var(--navy); background:var(--cream); }
  .quiz-opt.correct { border-color:#1E7A5A; background:#EAF7F0; color:#0F4A30; font-weight:600; }
  .quiz-opt.wrong   { border-color:#8A3A1A; background:#FDF3EE; color:#8A3A1A; }
  .quiz-opt:disabled { cursor:default; }

  .quiz-nav { display:flex; gap:8px; margin-top:8px; }
  .btn-next { flex:1; background:var(--navy); color:var(--cream); border:none; border-radius:8px; padding:11px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:opacity .2s; }
  .btn-next:hover { opacity:.8; }
  .btn-skip { background:var(--cream); color:var(--muted); border:1px solid var(--cream-border); border-radius:8px; padding:11px 16px; font-family:'Inter',sans-serif; font-size:14px; cursor:pointer; }

  .flashcard-wrap { perspective:1000px; margin-bottom:18px; }
  .flashcard { width:100%; height:165px; position:relative; transform-style:preserve-3d; transition:transform .5s; cursor:pointer; border-radius:14px; }
  .flashcard.flipped { transform:rotateY(180deg); }
  .fc-face { position:absolute; inset:0; border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; backface-visibility:hidden; padding:20px; text-align:center; }
  .fc-front { background:linear-gradient(135deg,var(--navy-deep),var(--navy)); }
  .fc-back  { background:var(--gold-light); border:2px solid var(--gold); transform:rotateY(180deg); }
  .fc-word { font-family:'Fraunces',serif; font-size:34px; font-weight:700; color:var(--cream); margin-bottom:5px; }
  .fc-pos  { font-size:13px; color:rgba(250,247,240,.45); }
  .fc-hint { font-size:11px; color:rgba(250,247,240,.3); margin-top:8px; }
  .fc-back-word { font-family:'Fraunces',serif; font-size:17px; font-weight:700; color:var(--ink); margin-bottom:7px; }
  .fc-back-syns { font-size:13px; color:var(--muted); margin-bottom:5px; }
  .fc-back-ex   { font-size:12px; color:var(--ink); font-style:italic; line-height:1.5; }

  .blank-sentence { font-size:18px; line-height:1.7; color:var(--ink); font-family:'Fraunces',serif; margin-bottom:10px; }
  #blankInput { border:2px solid var(--cream-border); border-radius:8px; padding:10px 14px; font-family:'Inter',sans-serif; font-size:15px; width:100%; outline:none; margin-bottom:8px; transition:border-color .2s; }
  #blankInput:focus { border-color:var(--gold); }
  #blankInput.correct-input { border-color:#1E7A5A; background:#EAF7F0; }
  #blankInput.wrong-input   { border-color:#8A3A1A; background:#FDF3EE; }
  .blank-check { background:var(--navy); color:var(--cream); border:none; border-radius:8px; padding:10px 20px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; }
  .blank-feedback { font-size:13px; margin-top:8px; min-height:18px; font-weight:500; }
  .blank-feedback.good { color:#0F4A30; }
  .blank-feedback.bad  { color:#8A3A1A; }

  .wf-target { font-family:'Fraunces',serif; font-size:20px; font-weight:600; color:var(--ink); margin-bottom:3px; }
  .wf-clue   { font-size:13px; color:var(--muted); margin-bottom:16px; }
  .wf-slots  { display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
  .wf-slot   { display:flex; align-items:center; gap:10px; }
  .wf-slot-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); width:68px; flex-shrink:0; }
  .wf-slot input { flex:1; border:2px solid var(--cream-border); border-radius:8px; padding:8px 12px; font-family:'Inter',sans-serif; font-size:14px; outline:none; transition:border-color .2s; }
  .wf-slot input:focus { border-color:var(--gold); }
  .wf-slot input.correct-input { border-color:#1E7A5A; background:#EAF7F0; }
  .wf-slot input.wrong-input   { border-color:#8A3A1A; background:#FDF3EE; }
  .wf-check { background:var(--navy); color:var(--cream); border:none; border-radius:8px; padding:10px 20px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; }

  .quiz-score-screen { display:none; text-align:center; }
  .quiz-score-screen.active { display:block; }
  .score-emoji  { font-size:56px; margin-bottom:12px; }
  .score-number { font-family:'Fraunces',serif; font-size:48px; font-weight:700; color:var(--ink); margin-bottom:5px; }
  .score-label  { font-size:15px; color:var(--muted); margin-bottom:26px; }
  .btn-retry    { background:var(--gold); color:var(--navy-deep); border:none; border-radius:10px; padding:12px 26px; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; cursor:pointer; margin-right:8px; }
  .btn-back-menu { background:var(--cream); color:var(--ink); border:1px solid var(--cream-border); border-radius:10px; padding:12px 22px; font-family:'Inter',sans-serif; font-size:15px; cursor:pointer; }

  @media (max-width:768px) {
    .main-content { padding:18px 14px 60px; }
    .card-grid { grid-template-columns:1fr; }
    .quiz-options { grid-template-columns:1fr; }
    .quiz-mode-grid { grid-template-columns:1fr 1fr; }
    .site-header { padding:12px 14px; }
    .word-badge { display:none; }
    .topic-bar-wrap { padding:12px 14px; }
    .topic-tab { min-width:70px; padding:10px 12px 9px; }
    .tab-icon  { font-size:20px; }
    .tab-label { font-size:10px; }
    .tab-count { font-size:10px; padding:1px 6px; }
    .tab-all   { padding:10px 14px; font-size:12px; }
  }
  @media (max-width:480px) {
    .quiz-panel { padding:22px 16px; }
    .quiz-mode-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">The Vocabulary <span>Bank</span></div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search any word…" oninput="renderAll()">
  </div>
  <div class="header-right">
    <span class="word-badge" id="wordBadge"></span>
    <button class="btn-quiz" onclick="openQuizMenu()">✦ Quiz me</button>
  </div>
</header>

<div class="topic-bar-wrap">
  <div class="topic-tab-row" id="topicTabRow"></div>
</div>

<div class="main-content">
  <div class="results-bar">
    <div class="results-info" id="resultsInfo"></div>
    <div class="type-filters" id="typeFilters"></div>
  </div>
  <div id="vocabContent"></div>
</div>

<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-panel">
    <button class="quiz-close" onclick="closeQuiz()">✕</button>
    <div id="quizMenuScreen">
      <div class="quiz-title">Quiz me</div>
      <div class="quiz-subtitle">Pick a mode, choose topics, then go.</div>
      <div class="quiz-mode-grid">
        <div class="quiz-mode-card selected" data-mode="synonym" onclick="selectMode(this)"><div class="quiz-mode-icon">🔀</div><div class="quiz-mode-name">Synonym Match</div><div class="quiz-mode-desc">Pick the right synonym</div></div>
        <div class="quiz-mode-card" data-mode="blank" onclick="selectMode(this)"><div class="quiz-mode-icon">✏️</div><div class="quiz-mode-name">Fill the Blank</div><div class="quiz-mode-desc">Type the word in context</div></div>

];

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let activeTopic = 'all';
let activeTypes = new Set();
let quizMode = 'synonym';
let quizTopics = new Set(Object.keys(TOPICS).filter(k=>k!=='all'));
let quizQ=[], quizIdx=0, quizScore=0;

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  return VOCAB.filter(v => {
    if (activeTopic !== 'all' && v.topic !== activeTopic) return false;
    if (activeTypes.size && !activeTypes.has(v.pos.split('/')[0])) return false;
    if (!q) return true;
    return v.word.includes(q)||v.synonyms.some(s=>s.includes(q))||v.collocations.some(c=>c.toLowerCase().includes(q));
  });
}

function renderTabs() {
  const row = document.getElementById('topicTabRow');
  let html = '';
  Object.entries(TOPICS).forEach(([k,t]) => {
    const count = k==='all' ? VOCAB.length : VOCAB.filter(v=>v.topic===k).length;
    const on = activeTopic===k;
    if (k==='all') {
      html += `<button class="tab-all ${on?'active':''}" onclick="setTopic('all')">📚 All Topics <span style="font-size:11px;opacity:.5;margin-left:3px;">${count}</span></button>`;
    } else {
      html += `<button class="topic-tab ${on?'active':''}" style="--tab-color:${t.color}" onclick="setTopic('${k}')">
        <span class="tab-icon">${t.emoji}</span>
        <span class="tab-label">${t.label}</span>
        <span class="tab-count">${count}</span>
      </button>`;
    }
  });
  row.innerHTML = html;
}

function setTopic(k) { activeTopic=k; renderTabs(); renderAll(); }

function renderTypeFilters() {
  const wrap = document.getElementById('typeFilters');
  wrap.innerHTML = ['verb','noun','adjective','adverb'].map(t =>
    `<button class="type-chip ${activeTypes.has(t)?'on':''}" onclick="toggleType('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`
  ).join('');
}
function toggleType(t) { activeTypes.has(t)?activeTypes.delete(t):activeTypes.add(t); renderTypeFilters(); renderAll(); }

function renderAll() {
  const filtered = getFiltered();
  document.getElementById('wordBadge').textContent = filtered.length+' words';
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  document.getElementById('resultsInfo').innerHTML = `Showing <strong>${filtered.length}</strong> words${q?` matching "<strong>${q}</strong>"`:``}`;
  const content = document.getElementById('vocabContent');
  if (!filtered.length) { content.innerHTML=`<div class="no-results"><strong>Nothing found</strong>Try a different word or clear your filters.</div>`; return; }
  const grouped={};
  filtered.forEach(v=>{ if(!grouped[v.topic]) grouped[v.topic]=[]; grouped[v.topic].push(v); });
  const order = Object.keys(TOPICS).filter(k=>k!=='all');
  let html='';
  order.forEach(topicKey=>{
    if (!grouped[topicKey]) return;
    const t=TOPICS[topicKey]; const words=grouped[topicKey];
    html+=`<div class="topic-section">
      <div class="section-header">
        <div class="section-icon" style="background:${t.color}18;color:${t.color}">${t.emoji}</div>
        <div class="section-title">${t.label}</div>
        <div class="section-count">${words.length} words</div>
      </div>
      <div class="card-grid">`;
    words.forEach(v=>{
      const rc = v.register==='formal'?'reg-formal':v.register==='informal'?'reg-informal':v.register==='negative'?'reg-negative':'reg-neutral';
      html+=`<div class="vocab-card" style="--card-accent:${TOPICS[v.topic].color}">
        <div class="card-top">
          <div class="headword">${v.word}<em>${v.pos}</em></div>
          <span class="register-tag ${rc}">${v.register}</span>
        </div>
        <div class="word-family">${v.family.map(f=>`<span>${f}</span>`).join('')}</div>
        <div class="mini-label">Synonyms</div>
        <div class="syn-list">${v.synonyms.map(s=>`<span class="syn-chip">${s}</span>`).join('')}</div>
        <div class="mini-label">Collocations</div>
        <div class="colloc-text">${v.collocations.map(c=>`<strong>${c.split(' ')[0]}</strong> ${c.split(' ').slice(1).join(' ')}`).join(' &nbsp;·&nbsp; ')}</div>
        <div class="example">${v.example}</div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  content.innerHTML=html;
}

// ── QUIZ ──
function openQuizMenu(){document.getElementById('quizOverlay').classList.add('open');showQuizMenu();renderQuizTopicFilter();}
function closeQuiz(){document.getElementById('quizOverlay').classList.remove('open');}
function showQuizMenu(){
  document.getElementById('quizMenuScreen').style.display='block';
  document.getElementById('quizQScreen').classList.remove('active');
  document.getElementById('quizScoreScreen').classList.remove('active');
}
function selectMode(el){document.querySelectorAll('.quiz-mode-card').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');quizMode=el.dataset.mode;}
function renderQuizTopicFilter(){
  document.getElementById('quizTopicFilter').innerHTML=Object.entries(TOPICS).filter(([k])=>k!=='all').map(([k,t])=>
    `<button class="quiz-filter-chip ${quizTopics.has(k)?'on':''}" onclick="toggleQT('${k}',this)">${t.emoji} ${t.label.split(/[& ]/)[0]}</button>`).join('');
}
function toggleQT(k,btn){quizTopics.has(k)?quizTopics.delete(k):quizTopics.add(k);if(!quizTopics.size)quizTopics.add(k);btn.classList.toggle('on',quizTopics.has(k));}
function shuffle(a){return a.sort(()=>Math.random()-.5);}

function startQuiz(){
  const pool=VOCAB.filter(v=>quizTopics.has(v.topic));
  quizQ=shuffle([...pool]).slice(0,Math.min(15,pool.length));
  quizIdx=0;quizScore=0;
  document.getElementById('quizMenuScreen').style.display='none';
  document.getElementById('quizQScreen').classList.add('active');
  document.getElementById('quizScoreScreen').classList.remove('active');
  renderQ();
}
function renderQ(){
  if(quizIdx>=quizQ.length){showScore();return;}
  const v=quizQ[quizIdx];
  document.getElementById('quizProgressFill').style.width=(quizIdx/quizQ.length*100)+'%';
  document.getElementById('quizQLabel').textContent=`Question ${quizIdx+1} of ${quizQ.length}`;
  document.getElementById('btnNext').style.display='none';
  const body=document.getElementById('quizQBody');
  if(quizMode==='synonym')renderSynQ(v,body);
  else if(quizMode==='blank')renderBlankQ(v,body);
  else if(quizMode==='flashcard')renderFlashQ(v,body);
  else renderWFQ(v,body);
}
function renderSynQ(v,body){
  const correct=v.synonyms[0];
  const opts=shuffle([correct,...shuffle(VOCAB.filter(w=>w.word!==v.word).map(w=>w.synonyms[0])).slice(0,3)]);
  body.innerHTML=`<div class="quiz-q-word">${v.word}</div><div class="quiz-q-hint">Choose the best synonym.</div>
    <div class="quiz-options">${opts.map(o=>`<button class="quiz-opt" onclick="checkSyn(this,'${o.replace(/'/g,"\\'")}','${correct.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>`;
}
function checkSyn(btn,chosen,correct){
  document.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
  if(chosen===correct){btn.classList.add('correct');quizScore++;}
  else{btn.classList.add('wrong');document.querySelectorAll('.quiz-opt').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});}
  document.getElementById('btnNext').style.display='block';
}
function renderBlankQ(v,body){
  const sentence=v.example.replace(new RegExp('\\b'+v.word+'s?\\b','i'),'________');
  body.innerHTML=`<div style="font-size:13px;color:var(--muted);margin-bottom:6px;">Complete the sentence:</div>
    <div class="blank-sentence">${sentence}</div>
    <input id="blankInput" placeholder="Type the missing word…" onkeydown="if(event.key==='Enter')checkBlank()">
    <div><button class="blank-check" onclick="checkBlank()">Check</button></div>
    <div class="blank-feedback" id="blankFeedback"></div>`;
}
function checkBlank(){
  const v=quizQ[quizIdx],inp=document.getElementById('blankInput'),fb=document.getElementById('blankFeedback');
  if(!inp.value.trim())return;
  if(inp.value.trim().toLowerCase()===v.word.toLowerCase()){inp.classList.add('correct-input');fb.textContent='✓ Correct!';fb.className='blank-feedback good';quizScore++;}
  else{inp.classList.add('wrong-input');fb.textContent=`✗ The answer is: ${v.word}`;fb.className='blank-feedback bad';}
  inp.disabled=true;document.querySelector('.blank-check').disabled=true;document.getElementById('btnNext').style.display='block';
}
function renderFlashQ(v,body){
  body.innerHTML=`<div class="flashcard-wrap"><div class="flashcard" id="flashcard" onclick="flipCard()">
    <div class="fc-face fc-front"><div class="fc-word">${v.word}</div><div class="fc-pos">${v.pos}</div><div class="fc-hint">Tap to reveal →</div></div>
    <div class="fc-face fc-back"><div class="fc-back-word">= ${v.synonyms.slice(0,3).join(', ')}</div><div class="fc-back-syns">📌 ${v.collocations[0]}</div><div class="fc-back-ex">${v.example}</div></div>
  </div></div>`;
  document.getElementById('btnNext').style.display='block';
}
function flipCard(){document.getElementById('flashcard').classList.toggle('flipped');}
function renderWFQ(v,body){
  const slots=v.family.slice(0,3);
  if(!slots.length){nextQuestion();return;}
  body.innerHTML=`<div class="wf-target">${v.word}</div><div class="wf-clue">Build the word family from: <strong>${v.family[0]}</strong></div>
    <div class="wf-slots" id="wfSlots">${slots.map((s,i)=>{
      const label=s.includes('(n)')?'Noun':s.includes('(v)')?'Verb':s.includes('(adj)')?'Adjective':s.includes('(adv)')?'Adverb':'Form';
      return `<div class="wf-slot"><span class="wf-slot-label">${label}</span><input data-answer="${s.replace(/\s*\([^)]*\)/g,'').trim()}" id="wfi${i}" placeholder="Type…"></div>`;
    }).join('')}</div><button class="wf-check" onclick="checkWF()">Check</button>`;
}
function checkWF(){
  let all=true;
  document.querySelectorAll('#wfSlots input').forEach(inp=>{
    if(inp.value.toLowerCase().trim()===inp.dataset.answer.toLowerCase().trim()){inp.classList.add('correct-input');}
    else{inp.classList.add('wrong-input');inp.value=inp.dataset.answer;all=false;}
    inp.disabled=true;
  });
  if(all)quizScore++;document.querySelector('.wf-check').disabled=true;document.getElementById('btnNext').style.display='block';
}
function skipQuestion(){quizIdx++;renderQ();}
function nextQuestion(){quizIdx++;renderQ();}
function showScore(){
  document.getElementById('quizQScreen').classList.remove('active');
  document.getElementById('quizScoreScreen').classList.add('active');
  const pct=Math.round(quizScore/quizQ.length*100);
  document.getElementById('scoreEmoji').textContent=pct>=80?'🏆':pct>=60?'👍':pct>=40?'💪':'📚';
  document.getElementById('scoreNumber').textContent=`${quizScore} / ${quizQ.length}`;
  document.getElementById('scoreLabel').textContent=pct>=80?'Excellent work!':pct>=60?'Good — keep practising!':'Keep going — you will get there!';
}

renderTabs();
renderTypeFilters();
renderAll();
</script>
</body>
</html>
